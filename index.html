(function(){"use strict";

function importCSV(file){notify('Importando...','pr');var r=new FileReader();r.onload=function(e){try{var lines=e.target.result.split(/\r?\n/);if(lines.length<2){notify('Vacío','dn');return}var sep=lines[0].indexOf('\t')>=0?'\t':lines[0].indexOf(';')>=0?';':',';var hdr=pcsv(lines[0],sep);var hmap={};hdr.forEach(function(h,i){hmap[h.trim().toLowerCase()]=i});var n=0;for(var i=1;i<lines.length;i++){if(!lines[i].trim())continue;var cols=pcsv(lines[i],sep);var p=mapCols(cols,hmap);if(p&&p.art_Clave){var ex=DB.products.findIndex(function(x){return x.art_Clave===p.art_Clave});if(ex>=0)Object.assign(DB.products[ex],p);else DB.products.push(p);n++}}notify('✅ '+n+' productos importados','ok');R()}catch(err){notify('Error: '+err.message,'dn')}};r.readAsText(file,'UTF-8')}
function importXLS(file){if(typeof XLSX==='undefined'){var s=document.createElement('script');s.src='https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js';s.onload=function(){procXLS(file)};s.onerror=function(){notify('Error librería','dn')};document.head.appendChild(s)}else procXLS(file)}
function procXLS(file){notify('Procesando...','pr');var r=new FileReader();r.onload=function(e){try{var wb=XLSX.read(e.target.result,{type:'binary'});var data=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{defval:''});var n=0;data.forEach(function(row){var p={};Object.keys(row).forEach(function(k){var kl=k.trim().toLowerCase();if(k.indexOf('art_')===0||k.indexOf('fam_')===0||k.indexOf('fab_')===0||k.indexOf('prov_')===0||k.indexOf('ssa_')===0)p[k.trim()]=row[k];if(kl==='clave'||kl==='codigo')p.art_Clave=String(row[k]);if(kl==='nombre'||kl==='producto')p.art_Nombre=String(row[k]);if(kl==='ean'||kl==='barcode')p.art_Referencia=String(row[k]);if(kl==='precio')p.art_Total=parseFloat(row[k])||null;if(kl==='costo')p.art_Costo=parseFloat(row[k])||null;if(kl==='existencia'||kl==='stock')p.art_Existencia=parseFloat(row[k])||null});if(p.art_Clave){var ex=DB.products.findIndex(function(x){return x.art_Clave===String(p.art_Clave)});if(ex>=0)Object.assign(DB.products[ex],p);else DB.products.push(p);n++}});notify('✅ '+n+' importados','ok');R()}catch(err){notify('Error: '+err.message,'dn')}};r.readAsBinaryString(file)}
function pcsv(line,sep){var res=[],cur='',inQ=false;for(var i=0;i<line.length;i++){var c=line[i];if(c==='"')inQ=!inQ;else if(c===sep&&!inQ){res.push(cur);cur=''}else cur+=c}res.push(cur);return res}

window.exportCSV=function(){if(!DB.products.length){notify('Sin datos','wn');return}var fs=['art_Clave','art_Nombre','art_Descripcion','art_Total','art_Costo','art_Existencia','art_Margen','art_Referencia','fam_clave','fam_Nombre','prov_Clave','fab_Nombre','art_Ubicacion','art_Receta','art_Generico','ssa_Clave','art_SAT','art_FecMod'];var csv=fs.join(',')+'\n';DB.products.forEach(function(p){csv+=fs.map(function(f){var v=p[f];if(v==null)return'';v=String(v);if(v.indexOf(',')>=0||v.indexOf('"')>=0)return'"'+v.replace(/"/g,'""')+'"';return v}).join(',')+'\n'});var blob=new Blob(['\ufeff'+csv],{type:'text/csv;charset=utf-8;'});var a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='ikrox_catalogo_'+new Date().toISOString().slice(0,10)+'.csv';a.click();URL.revokeObjectURL(a.href);notify('Exportado '+DB.products.length+' productos','ok')};
// ═══ PROVIDER LIST IMPORT ═══
window.handleProviderImport=function(inp){var f=inp.files[0];if(!f)return;inp.value='';window._pf=f;openModal(null,'<div class="mhd"><h3>Importar lista</h3><div class="cls" onclick="closeModal()">✕</div></div><div class="pm mb1">'+f.name+'</div><label class="pm">Proveedor (clave):</label><input class="inp mb05" id="ipk" placeholder="NAD, FAN, EQU..."><button class="btn btn-pr" style="width:100%;margin-top:8px" onclick="procPF()">Importar</button><div class="pm mt1">Columnas: art_Clave/codigo, lista_Publico/publico, lista_Farmacia, lista_Costo/costo, lista_CostoNeto/neto, lista_Descuento, lista_Bonificacion, lista_disponible</div>')};
window.procPF=function(){var f=window._pf,pk=document.getElementById('ipk').value.trim();if(!f||!pk){notify('Indica proveedor','wn');return}closeModal();if(f.name.match(/\.xlsx?$/i)){if(typeof XLSX==='undefined'){var s=document.createElement('script');s.src='https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js';s.onload=function(){procPFX(f,pk)};document.head.appendChild(s)}else procPFX(f,pk)}else{var r=new FileReader();r.onload=function(e){var lines=e.target.result.split(/\r?\n/);if(lines.length<2)return;var sep=lines[0].indexOf('\t')>=0?'\t':lines[0].indexOf(';')>=0?';':',';var hdr=pcsv(lines[0],sep);var hm={};hdr.forEach(function(h,i){hm[h.trim().toLowerCase()]=i});var n=0;for(var i=1;i<lines.length;i++){if(!lines[i].trim())continue;var cols=pcsv(lines[i],sep);var e2=mapPL(cols,hm,pk);if(e2&&e2.art_Clave){DB.providerLists.push(e2);n++}}notify('✅ '+n+' registros de '+pk,'ok');R()};r.readAsText(f,'UTF-8')}};
function procPFX(file,pk){var r=new FileReader();r.onload=function(e){var wb=XLSX.read(e.target.result,{type:'binary'});var data=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{defval:''});var n=0;data.forEach(function(row){var en={prov_Clave:pk};Object.keys(row).forEach(function(k){var kl=k.trim().toLowerCase();if(kl==='art_clave'||kl==='codigo'||kl==='clave')en.art_Clave=String(row[k]).trim();if(kl==='lista_publico'||kl==='publico'||kl==='precio_publico')en.lista_Publico=parseFloat(row[k])||null;if(kl==='lista_farmacia'||kl==='farmacia')en.lista_Farmacia=parseFloat(row[k])||null;if(kl==='lista_costo'||kl==='costo')en.lista_Costo=parseFloat(row[k])||null;if(kl==='lista_costoneto'||kl==='neto'||kl==='costoneto')en.lista_CostoNeto=parseFloat(row[k])||null;if(kl==='lista_descuento'||kl==='descuento')en.lista_Descuento=parseFloat(row[k])||null;if(kl==='lista_bonificacion'||kl==='bonificacion')en.lista_Bonificacion=parseFloat(row[k])||null;if(kl==='lista_disponible'||kl==='disponible')en.lista_disponible=String(row[k]).trim();if(kl==='lista_upc'||kl==='upc'||kl==='ean')en.lista_UPC=String(row[k]).trim()});if(en.art_Clave){DB.providerLists.push(en);n++}});notify('✅ '+n+' registros de '+pk,'ok');R()};r.readAsBinaryString(file)}
function mapPL(cols,hm,pk){var e={prov_Clave:pk};var M={'art_clave':'art_Clave','codigo':'art_Clave','clave':'art_Clave','lista_publico':'lista_Publico','publico':'lista_Publico','precio_publico':'lista_Publico','lista_farmacia':'lista_Farmacia','farmacia':'lista_Farmacia','lista_costo':'lista_Costo','costo':'lista_Costo','lista_costoneto':'lista_CostoNeto','costoneto':'lista_CostoNeto','neto':'lista_CostoNeto','lista_descuento':'lista_Descuento','descuento':'lista_Descuento','lista_bonificacion':'lista_Bonificacion','bonificacion':'lista_Bonificacion','lista_disponible':'lista_disponible','disponible':'lista_disponible','lista_upc':'lista_UPC','upc':'lista_UPC','ean':'lista_UPC'};var NUMS2=['lista_Publico','lista_Farmacia','lista_Costo','lista_CostoNeto','lista_Descuento','lista_Bonificacion'];Object.keys(M).forEach(function(k){var idx=hm[k];if(idx!==undefined&&cols[idx]!==undefined&&cols[idx]!==''){var t=M[k];if(NUMS2.indexOf(t)>=0)e[t]=parseFloat(cols[idx])||null;else e[t]=String(cols[idx]).trim()}});return e}
// ═══ SUPABASE LOAD ═══
function loadFromSupabase(){if(!sb)return;notify('Cargando...','pr');(async function(){try{var r1=await sb.from('t_articulo').select('*').limit(10000);if(r1.error)throw new Error(r1.error.message);if(r1.data)DB.products=r1.data;var r2=await sb.from('t_proveedor').select('*');if(!r2.error&&r2.data)DB.providers=r2.data;var r3=await sb.from('t_lista').select('*').limit(50000);if(!r3.error&&r3.data)DB.providerLists=r3.data;var r4=await sb.from('t_familia').select('*');if(!r4.error&&r4.data){var fm={};r4.data.forEach(function(f){fm[f.fam_Clave||f.fam_clave]=f.fam_Nombre});DB.products.forEach(function(p){if(p.fam_clave&&fm[p.fam_clave])p.fam_Nombre=fm[p.fam_clave]})}var r5=await sb.from('t_fabricante').select('*');if(!r5.error&&r5.data){var fbm={};r5.data.forEach(function(f){fbm[f.fab_Clave||f.fab_clave]=f.fab_Nombre});DB.products.forEach(function(p){if(p.fab_Clave&&fbm[p.fab_Clave])p.fab_Nombre=fbm[p.fab_Clave]})}notify('✅ '+DB.products.length+' productos, '+DB.providers.length+' proveedores','ok');R()}catch(err){notify('Error: '+err.message,'dn')}})()}
// ═══ PWA ═══
var dfp=null;
function initPWA(){window.addEventListener('beforeinstallprompt',function(e){e.preventDefault();dfp=e;var d=localStorage.getItem('ikrox_pwa_d');if(!d||Date.now()-parseInt(d)>6048e5)$('#PWA').style.display='block'});var iOS=/iPad|iPhone|iPod/.test(navigator.userAgent)&&!window.MSStream;var sa=window.matchMedia('(display-mode: standalone)').matches||navigator.standalone;if(iOS&&!sa){var d=localStorage.getItem('ikrox_pwa_d');if(!d||Date.now()-parseInt(d)>6048e5){$('#PWA').style.display='block';var b=$('#pwaBtn');b.textContent='Cómo instalar';b.onclick=function(){alert('En Safari:\n1. Toca Compartir (📤)\n2. "Agregar a pantalla de inicio"')}}}}
window.installPWA=function(){if(dfp){dfp.prompt();dfp.userChoice.then(function(c){if(c.outcome==='accepted')notify('✅ Instalada','ok');dfp=null;$('#PWA').style.display='none'})}};
window.dismissPWA=function(){$('#PWA').style.display='none';localStorage.setItem('ikrox_pwa_d',Date.now().toString())};
// ═══ INIT ═══
document.addEventListener('DOMContentLoaded',function(){initPWA();loadConfig();if(IKROX.config.supabase.url&&IKROX.config.supabase.anonKey)initSupabase();buildNav();R();var ls=$('#LS');if(ls)setTimeout(function(){ls.classList.add('gone');setTimeout(function(){ls.remove()},600)},1500);$('#APP').style.display='flex'});
})();
</script>
